{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Kotak &amp; Associates</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0f1a;
            background: linear-gradient(135deg, #0a0f1a 0%, #111827 50%, #0a0f1a 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: float-particle linear infinite;
        }

        .particle:nth-child(1) {
            width: 6px;
            height: 6px;
            background: #e94560;
            left: 10%;
            top: 20%;
            animation-duration: 12s;
            animation-delay: 0s;
        }

        .particle:nth-child(2) {
            width: 4px;
            height: 4px;
            background: #3b82f6;
            left: 25%;
            top: 70%;
            animation-duration: 15s;
            animation-delay: -3s;
        }

        .particle:nth-child(3) {
            width: 8px;
            height: 8px;
            background: #e94560;
            left: 55%;
            top: 30%;
            animation-duration: 10s;
            animation-delay: -5s;
        }

        .particle:nth-child(4) {
            width: 5px;
            height: 5px;
            background: #8b5cf6;
            left: 75%;
            top: 60%;
            animation-duration: 14s;
            animation-delay: -2s;
        }

        .particle:nth-child(5) {
            width: 3px;
            height: 3px;
            background: #3b82f6;
            left: 85%;
            top: 15%;
            animation-duration: 11s;
            animation-delay: -7s;
        }

        .particle:nth-child(6) {
            width: 7px;
            height: 7px;
            background: #e94560;
            left: 40%;
            top: 85%;
            animation-duration: 13s;
            animation-delay: -4s;
        }

        .particle:nth-child(7) {
            width: 4px;
            height: 4px;
            background: #8b5cf6;
            left: 65%;
            top: 10%;
            animation-duration: 16s;
            animation-delay: -6s;
        }

        .particle:nth-child(8) {
            width: 6px;
            height: 6px;
            background: #3b82f6;
            left: 15%;
            top: 50%;
            animation-duration: 9s;
            animation-delay: -1s;
        }

        @keyframes float-particle {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.15;
            }
            90% {
                opacity: 0.15;
            }
            100% {
                transform: translateY(-100vh) translateX(40px);
                opacity: 0;
            }
        }

        /* Pulsing circles illustration */
        .illustration {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 2rem;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            border: 2px solid;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse-ring 3s ease-in-out infinite;
        }

        .circle:nth-child(1) {
            width: 60px;
            height: 60px;
            border-color: rgba(233, 69, 96, 0.6);
            animation-delay: 0s;
        }

        .circle:nth-child(2) {
            width: 100px;
            height: 100px;
            border-color: rgba(233, 69, 96, 0.35);
            animation-delay: 0.5s;
        }

        .circle:nth-child(3) {
            width: 140px;
            height: 140px;
            border-color: rgba(233, 69, 96, 0.15);
            animation-delay: 1s;
        }

        .circle-dot {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #e94560;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        @keyframes pulse-ring {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.15);
                opacity: 0.5;
            }
        }

        /* Main content */
        .container {
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
            max-width: 600px;
            width: 100%;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #e94560, #8b5cf6, #3b82f6, #e94560);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 4s ease infinite, float-text 3s ease-in-out infinite;
            user-select: none;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float-text {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .error-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: #f1f5f9;
        }

        .error-description {
            font-size: 1.05rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.8rem;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: #e94560;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .btn-primary:hover {
            background: #d63851;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: #e2e8f0;
            border: 1.5px solid #334155;
        }

        .btn-secondary:hover {
            border-color: #e94560;
            color: #e94560;
            transform: translateY(-2px);
        }

        /* Logo / brand link */
        .brand-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .brand-link:hover {
            color: #e94560;
        }

        .brand-link i {
            font-size: 1rem;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .error-code {
                font-size: 5rem;
            }

            .error-title {
                font-size: 1.35rem;
            }

            .error-description {
                font-size: 0.95rem;
            }

            .illustration {
                width: 120px;
                height: 120px;
            }

            .circle:nth-child(1) { width: 45px; height: 45px; }
            .circle:nth-child(2) { width: 75px; height: 75px; }
            .circle:nth-child(3) { width: 105px; height: 105px; }
        }
    </style>
</head>
<body>

    <!-- Floating particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">
        <div class="error-code">404</div>

        <h1 class="error-title">Page Not Found</h1>

        <p class="error-description">
            The page you're looking for doesn't exist or has been moved.
        </p>

        <!-- Pulsing circles illustration -->
        <div class="illustration">
            <div class="circle-dot"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>

        <div class="btn-group">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i> Go Home
            </a>
            <a href="/contact/" class="btn btn-secondary">
                <i class="fas fa-envelope"></i> Contact Us
            </a>
        </div>

        <a href="/" class="brand-link">
            <i class="fas fa-building"></i> Kotak &amp; Associates
        </a>
    </div>

</body>
</html>
